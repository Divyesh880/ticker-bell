<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/svg" href="images/favicon.svg">
    <title>Ticker Bell</title>

    <style>
        body{margin:0;font-family:Arial,sans-serif}
        .header {display:flex;justify-content:center;}
        .navbar{position:fixed;top:30px;width:80%;display:flex;align-items:center;background-color:#fff;padding:20px 25px;box-shadow:0 0 20px 1px #313bfc33;margin:0 auto;border:1px solid #313bfc;border-radius:20px;}
        .logo img{height:40px}
        .nav-right{margin-left:auto;display:flex;align-items:center;gap:15px}
        .menu{display:flex;gap:15px}
        .menu a{text-decoration:none;color:#000;font-size:14px;cursor:pointer}
        .menu a:hover{color:#313bfc}
        .dropdown{position:relative;cursor:pointer}
        .dropdown-title{display:flex;align-items:center;gap:4px;font-size:14px}
        .dropdown-content{display:none;position:absolute;top:30px;background-color:#dbddff;min-width:160px;border-radius:6px;overflow:hidden;flex-direction:column;z-index:10}
        .dropdown-content a{padding:7px 10px;display:block;font-size:13px}
        .dropdown-content a:hover{color:#313bfc}
        .dropdown.active .dropdown-content{display:flex}
        .btn{padding:6px 12px;border:none;background-color:#313bfc;color:#fff;cursor:pointer;border-radius:4px}
        .burger{display:none;font-size:22px;cursor:pointer}
        @media (max-width:980px){
            .navbar{top:0;width:-webkit-fill-available;margin:0;border:0;border-radius:0;}
            .burger{display:block}
            .logo img{height:20px}
            .menu{position:absolute;top:60px;right:20px;background-color:#fff;box-shadow:0 0 20px 1px #313bfc33;flex-direction:column;width:200px;padding:10px;border-radius:6px;display:none}
            .menu.active{display:flex}
            .dropdown{width:100%}
            .dropdown-content{position:static}
        }
    </style>
</head>

<body>

    <div class="header">
        <div class="navbar">
            <div class="logo">
                <img src="images/logo.svg" alt="TickerBell">
            </div>
            <div class="nav-right">
                <div class="menu" id="menu">
                    <a>Home</a>
                    <a>Research</a>
                    <a>Books</a>
                    <a>Mentorship</a>
                    <a>Courses</a>
                    <!-- Click Dropdown -->
                    <div class="dropdown" id="aboutDropdown">
                        <div class="dropdown-title" onclick="toggleDropdown()">
                            About ▾
                        </div>
                        <div class="dropdown-content">
                            <a>Press</a>
                        </div>
                    </div>
                    <a>Contact</a>
                </div>
                <button class="btn">Login</button>
                <button class="btn">Sign up</button>
                <div class="burger" onclick="toggleMenu()">☰</div>
            </div>
        </div>
    </div>

    <script>
        function toggleMenu() {document.getElementById("menu").classList.toggle("active");}
        function toggleDropdown() {document.getElementById("aboutDropdown").classList.toggle("active");}
        // close dropdown if clicked outside
        document.addEventListener("click", function (e) {
            const dropdown = document.getElementById("aboutDropdown");
            if (!dropdown.contains(e.target)) {dropdown.classList.remove("active");}
        });
    </script>

</body>

</html>
